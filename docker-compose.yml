version: '3.8'
services:
  rag-kb:
    build: .
    command: streamlit run projects/rag-knowledge-base/dashboard.py --server.port=8531 --server.address=0.0.0.0
    ports:
      - "8531:8531"
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8531/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  llm-classify:
