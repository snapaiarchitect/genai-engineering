name: Data Refresh & Portfolio Update

on:
  schedule:
    # Weekly refresh every Sunday at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests pandas matplotlib seaborn

      - name: Refresh arXiv data
        run: |
          python -c "
          from src.apis.genai_client import fetch_arxiv_papers
          import pandas as pd, os
          papers = fetch_arxiv_papers(max_results=500)
          df = pd.DataFrame(papers)
          df.to_csv('projects/arxiv-classifier-research-engine/data/arxiv_papers.csv', index=False)
          print(f'arXiv: {len(df)} papers refreshed')
          "

      - name: Refresh PubMed data
        run: |
          python -c "
          from src.apis.genai_client import fetch_pubmed_abstracts
          import json, os
          results = fetch_pubmed_abstracts(max_results=500)
          with open('projects/pubmed-research-engine/data/pubmed_abstracts.json', 'w') as f:
              json.dump(results, f)
          print(f'PubMed: {len(results)} batches refreshed')
          "

      - name: Refresh ClinicalTrials data
        run: |
          python -c "
          from src.apis.genai_client import fetch_clinical_trials
          import json, os
          trials = fetch_clinical_trials(max_pages=5)
          with open('projects/nlp-clinical-trial-analysis/data/trials.json', 'w') as f:
              json.dump(trials, f)
          print(f'ClinicalTrials: {len(trials)} trials refreshed')
          "

      - name: Refresh Congress bills
        run: |
          python -c "
          from src.apis.genai_client import fetch_congress_bills
          import json, os
          bills = fetch_congress_bills(congress=118, max_results=496)
          with open('projects/nlp-legal-document-analysis/data/congress_bills.json', 'w') as f:
              json.dump(bills, f)
          print(f'Congress: {len(bills)} bills refreshed')
          "

      - name: Run tests
        run: |
          python projects/arxiv-classifier-research-engine/tests/test_data.py
          python projects/pubmed-research-engine/tests/test_data.py
          python projects/nlp-clinical-trial-analysis/tests/test_data.py
          python projects/nlp-legal-document-analysis/tests/test_data.py
          python projects/mlops-model-registry/tests/test_data.py
          python projects/nlp-supreme-court-opinion-analysis/tests/test_data.py
          python projects/scotus-opinions/tests/test_data.py
          python projects/rag-knowledge-base/tests/test_data.py
          python projects/llm-document-classification/tests/test_data.py

      - name: Commit refreshed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m "🔄 Weekly data refresh — $(date -u +%Y-%m-%d)"
          git push || echo 'Nothing to commit'
